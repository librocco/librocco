name: Vendor Source CI
"on":
  push:
    paths:
    - .gitmodules
    - 3rd-party/**
    - apps/e2e/package.json
    - apps/sync-server/package.json
    - apps/sync-server/vitest.config.ts
    - apps/web-client/svelte.config.js
    - apps/web-client/vitest.config.ts
    - python-apps/launcher/launcher/daemon_manager.py
    - scripts/prepare_vlcn_source.sh
    - scripts/register_vendor_source.mjs
    - scripts/run_with_vendor_source.mjs
    - scripts/vendor_source_config.mjs
    - .github/workflow.templates/vendor-source-ci.yml
  workflow_dispatch: null
jobs:
  vendor-source-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: false
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
    - name: Install Rust Toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: nightly-2023-10-05
        override: true
    - name: Install wasm-pack
      run: cargo install wasm-pack --version 0.13.1 --locked
    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.rush
          ~/.pnpm-store
          common/temp
          ./common/temp/node_modules/
        key: ${{ runner.os }}-modules-node20-v3-${{ hashFiles('**/pnpm-lock.yaml') }}
    - name: Add local rush scripts to PATH
      run: echo "${PWD}"/common/scripts >> $GITHUB_PATH
    - name: Prepare local vendor sources
      run: ./scripts/prepare_vlcn_source.sh
    - name: Install packages
      run: rush install
    - name: Build packages
      run: |
        set +e
        rush build
        exit_code=$?
        if [ $exit_code -eq 0 ] || [ $exit_code -eq 1 ]; then
          echo "Build completed (exit code: $exit_code)"
          exit 0
        else
          echo "Build failed with exit code: $exit_code"
          exit $exit_code
        fi
    - name: Install Playwright browsers
      run: cd apps/web-client && npx playwright install
    - name: Web client tests in source mode
      run: cd apps/web-client && rushx test:ci
    - name: Web client typecheck in source mode
      run: cd apps/web-client && rushx typecheck
    - name: E2E typecheck in source mode
      run: cd apps/e2e && rushx typecheck
    - name: Sync server build in source mode
      run: cd apps/sync-server && rushx build
    - name: Sync server tests in source mode
      run: cd apps/sync-server && rushx test:ci
    - name: Build the app for E2E in source mode
      run: cd apps/web-client && rushx build:e2e
    - name: Restructure build for /preview base path
      run: |
        cd apps/web-client
        mkdir preview
        mv build/* preview/
        mv preview build/
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        working-directory: python-apps/launcher
    - name: Clean stale test DBs
      run: rm -rf apps/sync-server/test-dbs && mkdir -p apps/sync-server/test-dbs
    - name: Start headless launcher in background
      run: |
        mkdir -p ~/.local/share/librocco-launcher/logs
        uv run --directory python-apps/launcher python main_headless.py 2>&1 | tee ~/.local/share/librocco-launcher/logs/headless.log &
        echo $! > /tmp/launcher.pid
        echo "Started launcher (PID: $(cat /tmp/launcher.pid))"
    - name: Wait for services to be ready
      run: |
        echo "Waiting for sync server..."
        timeout 30 bash -c 'until curl -f http://127.0.0.1:3000/ 2>/dev/null; do sleep 1; done'
        echo "Waiting for Caddy/web app..."
        timeout 30 bash -c 'until curl -f -k https://localhost:8433/preview/ 2>/dev/null; do sleep 1; done'
        echo "All services ready!"
    - name: Run E2E tests in source mode
      run: cd apps/e2e && rushx test:ci
    - name: Stop services
      if: always()
      run: |
        if [ -f /tmp/launcher.pid ]; then kill $(cat /tmp/launcher.pid) || true; fi
    - name: Upload launcher logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: vendor-source-launcher-logs
        path: ~/.local/share/librocco-launcher/logs/
        retention-days: 7
    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: vendor-source-e2e-results
        path: apps/e2e/test-results
        retention-days: 7
