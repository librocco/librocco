name: Vendor Source CI
"on":
  push:
    paths:
    - .gitmodules
    - 3rd-party/**
    - apps/e2e/package.json
    - apps/sync-server/package.json
    - apps/sync-server/vitest.config.ts
    - apps/web-client/svelte.config.js
    - apps/web-client/vitest.config.ts
    - python-apps/launcher/launcher/daemon_manager.py
    - scripts/prepare_vlcn_source.sh
    - scripts/register_vendor_source.mjs
    - scripts/run_with_vendor_source.mjs
    - scripts/vendor_source_config.mjs
    - .github/workflow.templates/vendor-source-ci.yml
  workflow_dispatch: null
jobs:
  vendor-source-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: false
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
    - name: Install Rust Toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: nightly-2023-10-05
        override: true
    - name: Install wasm-pack
      run: cargo install wasm-pack --version 0.13.1 --locked
    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.rush
          ~/.pnpm-store
          common/temp
          ./common/temp/node_modules/
        key: ${{ runner.os }}-modules-node20-v3-${{ hashFiles('**/pnpm-lock.yaml') }}
    - name: Add local rush scripts to PATH
      run: echo "${PWD}"/common/scripts >> $GITHUB_PATH
    - name: Prepare local vendor sources
      run: ./scripts/prepare_vlcn_source.sh
    - name: Install packages
      run: rush install
    - name: Build web-client workspace dependencies
      run: rush build --to @librocco/web-client
    - name: Web client typecheck in source mode
      run: cd apps/web-client && rushx typecheck
    - name: Sync server source-mode smoke
      run: |
        cd apps/sync-server
        node ../../scripts/run_with_vendor_source.mjs node --input-type=module -e "await import('@vlcn.io/ws-server'); console.log('sync-server source mode ok')"
