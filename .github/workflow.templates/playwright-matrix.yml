#@ load("github.lib.yml", "checkout")
#@ load("github.lib.yml", "load_artefacts")
#@ load("cache.lib.yml", "cache_node")
#@ load("cache.lib.yml", "load_cached_artefacts")
#@ load("rush.lib.yml", "rush_add_path")
#@ load("rush.lib.yml", "rush_install")
#@ load("rush.lib.yml", "rush_build")
#@ load("build-crsqlite.lib.yml", "build_crsqlite")

name: PlaywrightMatrix

"on":
  push:
    branches:
      - "playwright-matrix/**"

  schedule:
    - cron: "30 5 * * 1,3"

jobs:
  build-cr-sqlite: #@ build_crsqlite()

  e2e-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: build-cr-sqlite
    strategy:
      fail-fast: false
      matrix:
        dummy1: [1, 2, 3, 4, 5, 6]
        dummy2: [1, 2, 3, 4, 5, 6]
    steps:
      -  #@ checkout()
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      -  #@ load_artefacts()
      -  #@ load_cached_artefacts()
      -  #@ cache_node()
      -  #@ rush_add_path()
      -  #@ rush_install()
      -  #@ rush_build()
      - name: Build the app
        run: cd apps/web-client && rushx build:e2e
      - name: Restructure build for /preview base path
        run: |
          cd apps/web-client
          mkdir preview
          mv build/* preview/
          mv preview build/
      - name: Download playwright browsers
        run: cd apps/e2e && npx playwright install
      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: python-apps/launcher
      - name: Clean stale test DBs (fix schema mismatch)
        run: rm -rf apps/sync-server/test-dbs && mkdir -p apps/sync-server/test-dbs
      - name: Start headless launcher in background
        run: |
          mkdir -p ~/.local/share/librocco-launcher/logs
          uv run --directory python-apps/launcher python main_headless.py 2>&1 | tee ~/.local/share/librocco-launcher/logs/headless.log &
          echo $! > /tmp/launcher.pid
          echo "Started launcher (PID: $(cat /tmp/launcher.pid))"
      - name: Wait for services to be ready
        run: |
          echo "Waiting for sync server..."
          timeout 30 bash -c 'until curl -f http://127.0.0.1:3000/ 2>/dev/null; do sleep 1; done'
          echo "Waiting for Caddy/web app..."
          timeout 30 bash -c 'until curl -f -k https://localhost:8433/preview/ 2>/dev/null; do sleep 1; done'
          echo "All services ready!"
      - name: Run Playwright tests
        run: cd apps/e2e && rushx test:ci
      - name: Stop services
        if: always()
        run: |
          if [ -f /tmp/launcher.pid ]; then kill $(cat /tmp/launcher.pid) || true; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results-${{ matrix.dummy1 }}-${{ matrix.dummy2 }}
          path: apps/e2e/test-results
          retention-days: 30
