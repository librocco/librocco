name = "artefact-api-worker"
main = "worker.js"
compatibility_date = "2024-01-01"
account_id = "4ca1b102baca2e7067daf57e186e20c4"

# R2 bucket binding for artefact storage
[[r2_buckets]]
binding = "ARTEFACT_BUCKET"
bucket_name = "librocco-artefacts"
remote = true

# Routes - bind to artefacts.libroc.co
# NOTE: After deploying, create a DNS record in Cloudflare Dashboard:
# - Zone: libroc.co
# - Type: CNAME (or use Cloudflare proxy)
# - Name: artefacts
# - Target: (auto-assigned by Cloudflare for custom routes)
[[routes]]
pattern = "artefacts.libroc.co/*"
zone_name = "libroc.co"

# Environment variables (can also be set via wrangler secrets)
[vars]

# Secrets to configure with: wrangler secret put ARTEFACT_API_KEY
